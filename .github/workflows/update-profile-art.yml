name: Update profile art

# Refreshes the contribution graph + live-stats info card daily from real data.
# Runs daily, whenever you push to main, and on-demand.
#
# Token ladder (fetch_stats.py picks the first that exists):
#   * GH_STATS_TOKEN secret (a personal token w/ `repo` scope) -> includes your
#     PRIVATE contributions + lines of code.
#   * otherwise the Action's built-in GITHUB_TOKEN -> public activity + public LOC.
# The ASCII portrait (ascii.svg) is static and committed once, so it is NOT
# regenerated here.

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC every day
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GH_PROFILE_USER: ritessshhh
      GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch live GitHub stats (contribs, streaks, languages, LOC)
        run: python scripts/fetch_stats.py

      - name: Render animated contribution graph SVG
        run: python scripts/generate_streak_svg.py ritessshhh contrib-heatmap.svg

      - name: Render neofetch info card SVG
        run: python scripts/make_info_card.py

      - name: Commit updated art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile stats [skip ci]"
          file_pattern: "data/stats.json contrib-heatmap.svg info-card.svg"
